<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Certificate Library — Sanjay Mathivanan</title>
  <meta name="description" content="Explore Sanjay Mathivanan's professional certifications library, featuring nearly 100 certificates in AI, Machine Learning, Python, Java, and IoT." />
  <meta name="robots" content="index, follow" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Remix Icons -->
  <link href="https://cdn.jsdelivr.net/npm/remixicon@4.1.0/fonts/remixicon.css" rel="stylesheet" />

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <!-- Theme Fast Init -->
  <script>
    (function () {
      const savedTheme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const currentTheme = savedTheme || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', currentTheme);
    })();
  </script>

  <style>
    /* Custom Styles for Certificate Library */
    .library-hero {
      padding: 130px 0 50px 0;
      text-align: center;
      background: radial-gradient(circle at 50% 0%, var(--primary-glow) 0%, transparent 60%);
      border-bottom: 1px solid var(--border);
    }

    .library-title-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .library-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      background: var(--primary-light);
      padding: 6px 16px;
      border-radius: 30px;
      margin-bottom: 20px;
      border: 1px solid rgba(37, 99, 235, 0.1);
    }

    .library-title {
      font-family: var(--font-heading);
      font-size: 40px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 12px;
      letter-spacing: -0.02em;
    }

    .library-subtitle {
      font-size: 16px;
      color: var(--text-muted);
      max-width: 600px;
      margin: 0 auto;
    }

    /* Controls (Search & Filters) */
    .library-controls {
      position: sticky;
      top: 69px;
      z-index: 10;
      background: var(--bg-primary);
      border-bottom: 1px solid var(--border);
      padding: 16px 0;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.02);
      transition: top 0.3s var(--ease);
    }

    .controls-wrapper {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }

    .search-container {
      position: relative;
      width: 100%;
    }

    .search-input {
      width: 100%;
      padding: 14px 20px 14px 48px;
      font-size: 15px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      transition: all 0.3s var(--ease);
      box-shadow: var(--shadow-xs);
    }

    .search-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-light);
      outline: none;
    }

    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: var(--text-muted);
      pointer-events: none;
    }

    .filters-container {
      display: flex;
      align-items: center;
      gap: 10px;
      overflow-x: auto;
      padding-bottom: 4px;
      scrollbar-width: none;
    }

    .filters-container::-webkit-scrollbar {
      display: none;
    }

    .filter-btn {
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 600;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.3s var(--ease);
    }

    .filter-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .filter-btn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);
    }

    /* Cards Grid */
    .library-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
      max-width: 1200px;
      margin: 40px auto 0 auto;
      padding: 0 24px 80px 24px;
    }

    .lib-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 100%;
      transition: transform 0.3s var(--ease), box-shadow 0.3s var(--ease), border-color 0.3s var(--ease);
      position: relative;
      overflow: hidden;
      animation: cardFadeIn 0.4s var(--ease) both;
    }

    .lib-card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
      border-color: var(--primary);
    }

    @keyframes cardFadeIn {
      from {
        opacity: 0;
        transform: translateY(15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .lib-card-badge {
      position: absolute;
      top: 24px;
      right: 24px;
      font-size: 10px;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .lib-card-badge.coursera {
      background: var(--primary-light);
      color: var(--primary);
      border: 1px solid rgba(37, 99, 235, 0.1);
    }

    .lib-card-badge.mongodb {
      background: rgba(16, 185, 129, 0.08);
      color: #10B981;
      border: 1px solid rgba(16, 185, 129, 0.1);
    }

    .lib-pdf-icon-wrap {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: rgba(239, 68, 68, 0.08);
      color: #EF4444;
      font-size: 24px;
      margin-bottom: 16px;
      border: 1px solid rgba(239, 68, 68, 0.1);
    }

    .lib-card-title {
      font-family: var(--font-heading);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 42px;
    }

    .lib-card-meta {
      margin-bottom: 16px;
    }

    .lib-card-org {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .lib-card-date {
      font-size: 12px;
      color: var(--text-muted);
    }

    .lib-card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 20px;
    }

    .lib-card-tag {
      font-size: 10px;
      font-weight: 600;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text-muted);
      padding: 3px 8px;
      border-radius: 6px;
    }

    .lib-card-actions {
      display: flex;
      gap: 10px;
      margin-top: auto;
    }

    .lib-card-btn {
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      height: 38px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s var(--ease);
      text-decoration: none;
    }

    .lib-card-btn.preview {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      color: var(--text);
    }

    .lib-card-btn.preview:hover {
      background: var(--primary-light);
      border-color: var(--primary);
      color: var(--primary);
    }

    .lib-card-btn.download {
      background: var(--primary);
      color: #fff;
      border: 1px solid var(--primary);
    }

    .lib-card-btn.download:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
      transform: translateY(-1px);
    }

    /* Modal styling */
    .pdf-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s var(--ease);
    }

    .pdf-modal.open {
      opacity: 1;
      pointer-events: auto;
    }

    .modal-content {
      background: var(--bg-card);
      border: 1px solid var(--border);
      width: 90%;
      max-width: 1000px;
      height: 85%;
      border-radius: 20px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.35);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: scale(0.95);
      transition: transform 0.3s var(--ease);
    }

    .pdf-modal.open .modal-content {
      transform: scale(1);
    }

    .modal-header {
      padding: 16px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .modal-title-wrap {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-width: 80%;
    }

    .modal-title {
      font-family: var(--font-heading);
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .modal-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }

    .modal-close-btn {
      font-size: 24px;
      color: var(--text-muted);
      cursor: pointer;
      transition: color 0.3s var(--ease);
      background: transparent;
      border: none;
      outline: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close-btn:hover {
      color: var(--text);
    }

    .modal-body {
      flex: 1;
      background: #525659;
      position: relative;
    }

    .modal-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state i {
      font-size: 54px;
      color: var(--border);
      margin-bottom: 16px;
      display: block;
    }

    .empty-state h3 {
      font-size: 18px;
      color: var(--text);
      margin-bottom: 8px;
      font-family: var(--font-heading);
    }

    .nav-back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s var(--ease);
    }

    .nav-back-btn:hover {
      color: var(--primary);
    }

    /* Responsiveness */
    @media (max-width: 1200px) {
      .library-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 992px) {
      .library-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .library-title {
        font-size: 34px;
      }
    }

    @media (max-width: 768px) {
      .library-controls {
        top: 60px;
      }
    }

    @media (max-width: 576px) {
      .library-grid {
        grid-template-columns: 1fr;
        gap: 20px;
        padding: 0 16px 60px 16px;
      }
      .library-title {
        font-size: 28px;
      }
      .library-hero {
        padding: 110px 0 40px 0;
      }
      .lib-card {
        padding: 20px;
      }
      .modal-content {
        height: 95%;
        width: 95%;
      }
      .controls-wrapper {
        padding: 0 16px;
      }
    }
  </style>
</head>

<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="loader-spinner"></div>
    <span class="loader-name">Sanjay Mathivanan</span>
  </div>

  <!-- NAVIGATION -->
  <nav id="navbar">
    <div class="nav-container">
      <a href="index.html" class="nav-logo">
        <span class="logo-dot"></span>
        Sanjay M
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-back-btn"><i class="ri-arrow-left-line"></i> Back to Portfolio</a>
      </div>
      <div class="nav-right">
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <i class="ri-moon-line"></i>
        </button>
      </div>
    </div>
  </nav>

  <!-- HERO SECTION -->
  <section class="library-hero">
    <div class="library-title-wrap">
      <div class="library-badge">
        <i class="ri-award-fill"></i> Credentials
      </div>
      <h1 class="library-title">Professional Learning Library</h1>
      <p class="library-subtitle">A comprehensive archive of 98 professional certifications across multiple fields validating my commitment to continuous learning.</p>
    </div>
  </section>

  <!-- SEARCH & FILTERS -->
  <div class="library-controls" id="library">
    <div class="controls-wrapper">
      <div class="search-container">
        <i class="ri-search-line search-icon"></i>
        <input type="text" id="search-input" class="search-input" placeholder="Search certificates by title, technology, or organization..." />
      </div>
      <div class="filters-container" id="filters-container">
        <button class="filter-btn active" data-category="All">All</button>
        <button class="filter-btn" data-category="Coursera">Coursera</button>
        <button class="filter-btn" data-category="MongoDB">MongoDB</button>
        <button class="filter-btn" data-category="Artificial Intelligence">Artificial Intelligence</button>
        <button class="filter-btn" data-category="Machine Learning">Machine Learning</button>
        <button class="filter-btn" data-category="Python">Python</button>
        <button class="filter-btn" data-category="Java">Java</button>
        <button class="filter-btn" data-category="Backend">Backend</button>
        <button class="filter-btn" data-category="Cloud">Cloud</button>
        <button class="filter-btn" data-category="Database">Database</button>
        <button class="filter-btn" data-category="IoT">IoT</button>
        <button class="filter-btn" data-category="Cyber Security">Cyber Security</button>
        <button class="filter-btn" data-category="Robotics">Robotics</button>
      </div>
    </div>
  </div>

  <!-- CERTIFICATE CARDS GRID -->
  <div class="library-grid" id="library-grid">
    <!-- Rendered dynamically by Javascript -->
  </div>

  <!-- PDF MODAL VIEWER -->
  <div class="pdf-modal" id="pdf-modal">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title-wrap">
          <h4 class="modal-title" id="modal-title">Certificate Title</h4>
          <span class="modal-subtitle" id="modal-subtitle">Organization</span>
        </div>
        <button class="modal-close-btn" id="modal-close-btn" aria-label="Close Preview">
          <i class="ri-close-line"></i>
        </button>
      </div>
      <div class="modal-body">
        <iframe class="modal-iframe" id="modal-iframe" src="" title="PDF Viewer"></iframe>
      </div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer style="padding: 40px 24px; text-align: center; font-size: 13px; color: var(--text-muted); border-top: 1px solid var(--border); background: var(--bg-secondary);">
    <p>© 2026 Sanjay Mathivanan. All rights reserved.</p>
  </footer>

  <!-- Certificate Data -->
  <script src="assets/Certificates/certificates-data.js"></script>

  <!-- Script logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // ──────────────────────────────────────
      // Loader screen hide
      // ──────────────────────────────────────
      const loader = document.getElementById('loader');
      setTimeout(() => {
        loader.classList.add('hidden');
      }, 500);

      // ──────────────────────────────────────
      // Dark Mode Toggle Sync
      // ──────────────────────────────────────
      const themeToggle = document.getElementById('theme-toggle');
      
      function updateThemeIcon(theme) {
        const icon = themeToggle.querySelector('i');
        if (icon) {
          icon.className = theme === 'dark' ? 'ri-sun-line' : 'ri-moon-line';
        }
      }

      updateThemeIcon(document.documentElement.getAttribute('data-theme'));

      themeToggle.addEventListener('click', () => {
        const currentTheme = document.documentElement.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
      });

      // ──────────────────────────────────────
      // Sticky Navigation Scrolled state
      // ──────────────────────────────────────
      const navbar = document.getElementById('navbar');
      window.addEventListener('scroll', () => {
        if (window.scrollY > 50) {
          navbar.classList.add('scrolled');
        } else {
          navbar.classList.remove('scrolled');
        }
      });

      // ──────────────────────────────────────
      // Library Render, Filter and Search
      // ──────────────────────────────────────
      const grid = document.getElementById('library-grid');
      const searchInput = document.getElementById('search-input');
      const filterContainer = document.getElementById('filters-container');
      const certificates = window.CERTIFICATES_DATA || [];

      let currentCategory = 'All';
      let searchQuery = '';

      function render() {
        grid.innerHTML = '';
        
        // Filter logic
        const filtered = certificates.filter(cert => {
          // Category filter match
          let categoryMatch = false;
          if (currentCategory === 'All') {
            categoryMatch = true;
          } else if (currentCategory === 'Coursera') {
            categoryMatch = cert.source === 'Coursera';
          } else if (currentCategory === 'MongoDB') {
            categoryMatch = cert.source === 'MongoDB';
          } else {
            categoryMatch = cert.categories.includes(currentCategory);
          }

          // Search match (title, organization, or categories)
          const textToMatch = `${cert.title} ${cert.organization} ${cert.categories.join(' ')}`.toLowerCase();
          const searchMatch = textToMatch.includes(searchQuery.toLowerCase());

          return categoryMatch && searchMatch;
        });

        if (filtered.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <i class="ri-search-line"></i>
              <h3>No certificates found</h3>
              <p>Try refining your search query or choosing another category.</p>
            </div>
          `;
          return;
        }

        filtered.forEach((cert, idx) => {
          const card = document.createElement('div');
          card.className = 'lib-card';
          // staggered animation delay
          card.style.animationDelay = `${Math.min(idx * 30, 300)}ms`;

          const sourceBadgeClass = cert.source.toLowerCase() === 'coursera' ? 'coursera' : 'mongodb';
          const tagsHtml = cert.categories.map(cat => `<span class="lib-card-tag">${cat}</span>`).join('');

          card.innerHTML = `
            <span class="lib-card-badge ${sourceBadgeClass}">${cert.source}</span>
            <div class="lib-card-top">
              <div class="lib-pdf-icon-wrap">
                <i class="ri-file-pdf-2-line"></i>
              </div>
              <h3 class="lib-card-title" title="${cert.title}">${cert.title}</h3>
              <div class="lib-card-meta">
                <div class="lib-card-org">${cert.organization}</div>
                <div class="lib-card-date">${cert.date || '2025/2026'}</div>
              </div>
              <div class="lib-card-tags">
                ${tagsHtml}
              </div>
            </div>
            <div class="lib-card-actions">
              <button class="lib-card-btn preview" data-file="${cert.filePath}" data-title="${cert.title}" data-org="${cert.organization}">
                <i class="ri-eye-line"></i> Preview
              </button>
              <a href="${cert.filePath}" download class="lib-card-btn download">
                <i class="ri-download-line"></i> Download
              </a>
            </div>
          `;

          grid.appendChild(card);
        });

        // Add event listeners to preview buttons
        const previewButtons = grid.querySelectorAll('.lib-card-btn.preview');
        previewButtons.forEach(btn => {
          btn.addEventListener('click', (e) => {
            const file = btn.getAttribute('data-file');
            const title = btn.getAttribute('data-title');
            const org = btn.getAttribute('data-org');
            openModal(file, title, org);
          });
        });
      }

      // ──────────────────────────────────────
      // Category Button Clicks
      // ──────────────────────────────────────
      filterContainer.addEventListener('click', (e) => {
        if (e.target.classList.contains('filter-btn')) {
          // Remove active class from previous
          filterContainer.querySelector('.filter-btn.active').classList.remove('active');
          
          // Add to current
          e.target.classList.add('active');
          currentCategory = e.target.getAttribute('data-category');
          render();
        }
      });

      // ──────────────────────────────────────
      // Real-time Search Input
      // ──────────────────────────────────────
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        render();
      });

      // ──────────────────────────────────────
      // Modal Preview Handlers
      // ──────────────────────────────────────
      const modal = document.getElementById('pdf-modal');
      const modalIframe = document.getElementById('modal-iframe');
      const modalTitle = document.getElementById('modal-title');
      const modalSubtitle = document.getElementById('modal-subtitle');
      const modalClose = document.getElementById('modal-close-btn');

      function openModal(filePath, title, org) {
        modalTitle.textContent = title;
        modalSubtitle.textContent = org;
        modalIframe.src = filePath;
        modal.classList.add('open');
        document.body.style.overflow = 'hidden'; // Lock background scrolling
      }

      function closeModal() {
        modal.classList.remove('open');
        // Clear src to stop PDF rendering in background
        modalIframe.src = '';
        document.body.style.overflow = '';
      }

      modalClose.addEventListener('click', closeModal);
      
      // Close on clicking overlay outside the content modal
      modal.addEventListener('click', (e) => {
        if (e.target === modal) {
          closeModal();
        }
      });

      // Close on Escape key press
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && modal.classList.contains('open')) {
          closeModal();
        }
      });

      // Initial Render
      render();
    });
  </script>
</body>

</html>
